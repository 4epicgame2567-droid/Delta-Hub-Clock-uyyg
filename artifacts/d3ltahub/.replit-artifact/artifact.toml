kind = "web"
previewPath = "/"
title = "D3LTAHUB"
version = "1.0.0"
id = "artifacts/d3ltahub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21057

[services.development]
run = "pnpm --filter @workspace/d3ltahub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/d3ltahub", "run", "build" ]
publicDir = "artifacts/d3ltahub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21057"
BASE_PATH = "/"
